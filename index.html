<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f0c29">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>لوحتي | سعود</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-gold: #fbbf24;
            --danger: #f87171;
            --success: #34d399;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            top: -80px;
            right: -80px;
        }

        .orb-2 {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            bottom: 80px;
            left: -60px;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            top: 40%;
            right: 10%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(15px, -20px) scale(1.05); }
        }

        /* App Container - Full Screen No Scroll */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .app-header {
            padding: 1rem 1rem 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            background: linear-gradient(180deg, rgba(15, 12, 41, 0.95) 0%, rgba(15, 12, 41, 0) 100%);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .designer-credit {
            font-size: 0.6rem;
            color: var(--text-secondary);
            opacity: 0.8;
        }

        .time-section {
            text-align: left;
        }

        #current-time {
            font-size: 0.85rem;
            font-weight: 700;
        }

        #current-date {
            font-size: 0.6rem;
            color: var(--text-secondary);
        }

        /* Greeting */
        .greeting-section {
            padding: 0 1rem 0.5rem;
            flex-shrink: 0;
        }

        .greeting {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-display {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 0.8rem;
            padding: 0 1rem;
            margin-bottom: 0.8rem;
            flex-shrink: 0;
        }

        .quick-btn {
            flex: 1;
            padding: 0.6rem 0.8rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quick-btn:active {
            transform: scale(0.96);
        }

        .quick-btn.primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
        }

        /* Stats Grid - Compact */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            padding: 0 1rem;
            margin-bottom: 0.8rem;
            flex-shrink: 0;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 0.7rem;
            text-align: center;
        }

        .stat-card .stat-icon {
            font-size: 1.3rem;
            margin-bottom: 0.3rem;
        }

        .stat-card .stat-value {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        /* Tabs Navigation */
        .tabs-nav {
            display: flex;
            background: rgba(15, 12, 41, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 0.7rem 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn .tab-icon {
            font-size: 1.1rem;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        /* Content Area - Limited Height, No Scroll */
        .content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0.8rem 0;
            scrollbar-width: thin;
        }

        .content-area::-webkit-scrollbar {
            width: 3px;
        }

        .content-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* Tab Content */
        .tab-content {
            display: none;
            padding: 0 1rem;
        }

        .tab-content.active {
            display: block;
        }

        /* List Items */
        .list-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 0.8rem;
            margin-bottom: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .list-item:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
        }

        .item-info h4 {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .item-info p {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .item-amount {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--danger);
        }

        /* Thought Card */
        .thought-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 0.8rem;
            margin-bottom: 0.6rem;
            position: relative;
            cursor: pointer;
        }

        .thought-card:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
        }

        .thought-card::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, #ec4899, #8b5cf6);
            border-radius: 3px 0 0 3px;
        }

        .thought-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .thought-mood {
            font-size: 1.1rem;
        }

        .thought-title {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }

        .thought-content {
            font-size: 0.75rem;
            line-height: 1.4;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .thought-date {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.4rem;
        }

        /* Chart */
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .category-bar {
            display: flex;
            align-items: center;
            margin-bottom: 0.6rem;
            gap: 0.5rem;
        }

        .bar-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            min-width: 50px;
        }

        .bar-track {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .bar-value {
            font-size: 0.7rem;
            font-weight: 600;
            min-width: 40px;
            text-align: left;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.75rem;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 2000;
            padding: 1rem;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-card {
            background: linear-gradient(135deg, #1e1b3a, #15122e);
            border-radius: 32px;
            padding: 1.2rem;
            width: 100%;
            max-width: 320px;
            border: 1px solid var(--glass-border);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 0.8rem;
        }

        .form-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
        }

        textarea.form-input {
            min-height: 80px;
            resize: none;
        }

        select.form-input {
            appearance: none;
        }

        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            cursor: pointer;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(52, 211, 153, 0.95);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 3000;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: rgba(248, 113, 113, 0.95);
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Header -->
    <div class="app-header">
        <div>
            <div class="logo">✨ لوحتي</div>
            <div class="designer-credit">تصميم: سعود</div>
        </div>
        <div class="time-section">
            <div id="current-time">--:--</div>
            <div id="current-date">--/--</div>
        </div>
    </div>

    <!-- Greeting -->
    <div class="greeting-section">
        <div class="greeting" id="greeting-text">أهلاً بك 👋</div>
        <div class="date-display" id="hijri-date"></div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <button class="quick-btn primary" onclick="openModal('expense-modal')">
            <span>💸</span> مصروف
        </button>
        <button class="quick-btn" onclick="openModal('thought-modal')">
            <span>📝</span> خاطرة
        </button>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-value" id="total-expenses">٠</div>
            <div class="stat-label">إجمالي المصروفات</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💭</div>
            <div class="stat-value" id="total-thoughts">٠</div>
            <div class="stat-label">خواطرك</div>
        </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="tabs-nav">
        <button class="tab-btn active" data-tab="expenses-tab">
            <span class="tab-icon">💸</span>
            <span>المصروفات</span>
        </button>
        <button class="tab-btn" data-tab="thoughts-tab">
            <span class="tab-icon">📝</span>
            <span>الخواطر</span>
        </button>
        <button class="tab-btn" data-tab="stats-tab">
            <span class="tab-icon">📊</span>
            <span>الإحصائيات</span>
        </button>
    </div>

    <!-- Content Area -->
    <div class="content-area">
        <!-- Expenses Tab -->
        <div id="expenses-tab" class="tab-content active">
            <div id="expenses-list">
                <div class="empty-state">
                    <div class="empty-icon">💸</div>
                    <p>لا توجد مصروفات بعد</p>
                </div>
            </div>
        </div>

        <!-- Thoughts Tab -->
        <div id="thoughts-tab" class="tab-content">
            <div id="thoughts-list">
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <p>لا توجد خواطر بعد</p>
                </div>
            </div>
        </div>

        <!-- Stats Tab -->
        <div id="stats-tab" class="tab-content">
            <div class="chart-container" id="category-chart">
                <div class="empty-state">
                    <div class="empty-icon">📊</div>
                    <p>لا توجد بيانات كافية</p>
                </div>
            </div>
            <div class="stat-card" style="margin-top: 0.5rem;">
                <div class="stat-icon">🏆</div>
                <div class="stat-label">أعلى فئة مصروفات</div>
                <div id="top-category" style="font-size: 1rem; font-weight: 700; color: var(--accent-gold); margin-top: 0.3rem;">-</div>
            </div>
        </div>
    </div>
</div>

<!-- Modals -->
<div class="modal" id="expense-modal">
    <div class="modal-card">
        <div class="modal-header">
            <div class="modal-title">💸 مصروف جديد</div>
            <button class="close-btn" onclick="closeModal('expense-modal')">✕</button>
        </div>
        <form id="expense-form" onsubmit="handleExpense(event)">
            <div class="form-group">
                <label class="form-label">الوصف</label>
                <input type="text" class="form-input" id="exp-desc" placeholder="ماذا أنفقت؟" required>
            </div>
            <div class="form-group">
                <label class="form-label">المبلغ (ريال)</label>
                <input type="number" class="form-input" id="exp-amount" placeholder="٠" required min="0" step="0.01">
            </div>
            <div class="form-group">
                <label class="form-label">الفئة</label>
                <select class="form-input" id="exp-category">
                    <option value="طعام">🍽️ طعام</option>
                    <option value="مواصلات">🚗 مواصلات</option>
                    <option value="تسوق">🛍️ تسوق</option>
                    <option value="فواتير">💡 فواتير</option>
                    <option value="ترفيه">🎮 ترفيه</option>
                    <option value="صحة">💊 صحة</option>
                    <option value="تعليم">📚 تعليم</option>
                    <option value="أخرى">📦 أخرى</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">💾 حفظ</button>
        </form>
    </div>
</div>

<div class="modal" id="thought-modal">
    <div class="modal-card">
        <div class="modal-header">
            <div class="modal-title">✍️ خاطرة جديدة</div>
            <button class="close-btn" onclick="closeModal('thought-modal')">✕</button>
        </div>
        <form id="thought-form" onsubmit="handleThought(event)">
            <div class="form-group">
                <label class="form-label">العنوان</label>
                <input type="text" class="form-input" id="thought-title" placeholder="عنوان مختصر" required>
            </div>
            <div class="form-group">
                <label class="form-label">خاطرتك</label>
                <textarea class="form-input" id="thought-content" placeholder="اكتب ما يدور في ذهنك..." required></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">المزاج</label>
                <select class="form-input" id="thought-mood">
                    <option value="😊 سعيد">😊 سعيد</option>
                    <option value="🤔 أفكر">🤔 أفكر</option>
                    <option value="😌 هادئ">😌 هادئ</option>
                    <option value="💪 متحمس">💪 متحمس</option>
                    <option value="❤️ ممتن">❤️ ممتن</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">🌟 حفظ</button>
        </form>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    let thoughts = JSON.parse(localStorage.getItem('thoughts')) || [];

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        updateDateTime();
        setInterval(updateDateTime, 60000);
        setGreeting();
        updateHijriDate();
        updateUI();
        setupTabs();
    });

    function updateDateTime() {
        const now = new Date();
        document.getElementById('current-time').textContent = now.toLocaleTimeString('ar-SA', {hour: '2-digit', minute: '2-digit'});
        document.getElementById('current-date').textContent = now.toLocaleDateString('ar-SA', {day: 'numeric', month: 'short'});
    }

    function updateHijriDate() {
        const now = new Date();
        document.getElementById('hijri-date').textContent = now.toLocaleDateString('ar-SA-u-ca-islamic', {day: 'numeric', month: 'long'});
    }

    function setGreeting() {
        const hour = new Date().getHours();
        const greeting = document.getElementById('greeting-text');
        if (hour < 12) greeting.textContent = 'صباح النور ☀️';
        else if (hour < 17) greeting.textContent = 'طاب مساؤك 🌤️';
        else greeting.textContent = 'مساء الخير 🌙';
    }

    function formatNum(num) {
        return num.toLocaleString('ar-SA');
    }

    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${type} show`;
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function openModal(modalId) {
        document.getElementById(modalId).classList.add('active');
    }

    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
    }

    function setupTabs() {
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
            });
        });
    }

    function handleExpense(e) {
        e.preventDefault();
        const expense = {
            id: Date.now(),
            desc: document.getElementById('exp-desc').value,
            amount: parseFloat(document.getElementById('exp-amount').value),
            category: document.getElementById('exp-category').value,
            date: new Date().toLocaleDateString('ar-SA'),
            timestamp: new Date().toISOString()
        };
        expenses.unshift(expense);
        localStorage.setItem('expenses', JSON.stringify(expenses));
        closeModal('expense-modal');
        showToast('✅ تم حفظ المصروف');
        e.target.reset();
        updateUI();
    }

    function handleThought(e) {
        e.preventDefault();
        const thought = {
            id: Date.now(),
            title: document.getElementById('thought-title').value,
            content: document.getElementById('thought-content').value,
            mood: document.getElementById('thought-mood').value,
            date: new Date().toLocaleDateString('ar-SA'),
            timestamp: new Date().toISOString()
        };
        thoughts.unshift(thought);
        localStorage.setItem('thoughts', JSON.stringify(thoughts));
        closeModal('thought-modal');
        showToast('🌟 تم حفظ الخاطرة');
        e.target.reset();
        updateUI();
    }

    function deleteExpense(id) {
        if (confirm('🗑️ حذف هذا المصروف؟')) {
            expenses = expenses.filter(e => e.id !== id);
            localStorage.setItem('expenses', JSON.stringify(expenses));
            updateUI();
            showToast('تم الحذف');
        }
    }

    function deleteThought(id) {
        if (confirm('🗑️ حذف هذه الخاطرة؟')) {
            thoughts = thoughts.filter(t => t.id !== id);
            localStorage.setItem('thoughts', JSON.stringify(thoughts));
            updateUI();
            showToast('تم الحذف');
        }
    }

    function updateUI() {
        const totalExp = expenses.reduce((s, e) => s + e.amount, 0);
        document.getElementById('total-expenses').textContent = formatNum(totalExp) + ' ر.س';
        document.getElementById('total-thoughts').textContent = formatNum(thoughts.length);

        // Expenses List
        const expensesDiv = document.getElementById('expenses-list');
        if (expenses.length === 0) {
            expensesDiv.innerHTML = '<div class="empty-state"><div class="empty-icon">💸</div><p>لا توجد مصروفات بعد</p></div>';
        } else {
            expensesDiv.innerHTML = expenses.map(exp => `
                <div class="list-item" onclick="deleteExpense(${exp.id})">
                    <div class="item-info">
                        <h4>${exp.category} ${exp.desc}</h4>
                        <p>${exp.date}</p>
                    </div>
                    <div class="item-amount">${formatNum(exp.amount)} ر.س</div>
                </div>
            `).join('');
        }

        // Thoughts List
        const thoughtsDiv = document.getElementById('thoughts-list');
        if (thoughts.length === 0) {
            thoughtsDiv.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><p>لا توجد خواطر بعد</p></div>';
        } else {
            thoughtsDiv.innerHTML = thoughts.map(t => `
                <div class="thought-card" onclick="deleteThought(${t.id})">
                    <div class="thought-header">
                        <span class="thought-mood">${t.mood.split(' ')[0]}</span>
                    </div>
                    <div class="thought-title">${escapeHtml(t.title)}</div>
                    <div class="thought-content">${escapeHtml(t.content)}</div>
                    <div class="thought-date">${t.date}</div>
                </div>
            `).join('');
        }

        updateStats();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateStats() {
        if (expenses.length === 0) {
            document.getElementById('category-chart').innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><p>لا توجد بيانات كافية</p></div>';
            document.getElementById('top-category').textContent = '-';
            return;
        }

        const cats = {};
        expenses.forEach(e => cats[e.category] = (cats[e.category] || 0) + e.amount);
        const maxVal = Math.max(...Object.values(cats));
        const colors = ['#6366f1', '#ec4899', '#14b8a6', '#fbbf24', '#f87171', '#8b5cf6'];
        
        const chart = document.getElementById('category-chart');
        chart.innerHTML = Object.entries(cats).map(([cat, val], i) => `
            <div class="category-bar">
                <div class="bar-label">${cat}</div>
                <div class="bar-track">
                    <div class="bar-fill" style="width: ${(val/maxVal)*100}%; background: ${colors[i % colors.length]}"></div>
                </div>
                <div class="bar-value">${formatNum(val)}</div>
            </div>
        `).join('');
        
        const topCat = Object.entries(cats).sort((a, b) => b[1] - a[1])[0];
        document.getElementById('top-category').textContent = topCat ? topCat[0] : '-';
    }

    window.openModal = openModal;
    window.closeModal = closeModal;
    window.handleExpense = handleExpense;
    window.handleThought = handleThought;
    window.deleteExpense = deleteExpense;
    window.deleteThought = deleteThought;
</script>
</body>
</html>
