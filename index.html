<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=no">
    <title>لوحة التحكم الذهبية | تصميم سعود</title>
    <!-- خطوط عربية فاخرة -->
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Changa:wght@400;500;600;700;800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a1a1a 0%, #0a2a2a 100%);
            min-height: 100vh;
            font-family: 'Almarai', 'Cairo', 'Changa', system-ui, sans-serif;
            padding: 16px;
        }

        /* الحاوية الرئيسية */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* الهيدر */
        .header {
            text-align: center;
            margin-bottom: 28px;
            animation: fadeInDown 0.6s ease;
        }

        .title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5da9e, #e8c97a, #d4ae5a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            font-family: 'Changa', sans-serif;
        }

        .subtitle {
            color: #e8c97a;
            font-size: 0.85rem;
            border-top: 1px solid rgba(232, 201, 122, 0.4);
            display: inline-block;
            padding-top: 6px;
        }

        /* شبكة البطاقات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        /* البطاقات */
        .card {
            background: linear-gradient(145deg, rgba(30, 55, 55, 0.75), rgba(20, 45, 45, 0.85));
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(232, 201, 122, 0.4);
            padding: 22px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #e8c97a;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(232, 201, 122, 0.4);
        }

        .card-header i {
            font-size: 1.8rem;
            color: #f5da9e;
        }

        .card-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f5da9e;
            font-family: 'Changa', sans-serif;
        }

        /* منطقة الأفكار */
        .thoughts-area {
            width: 100%;
            min-height: 200px;
            background: rgba(10, 35, 35, 0.6);
            border: 1px solid rgba(232, 201, 122, 0.3);
            border-radius: 28px;
            padding: 16px;
            color: #e8f0e8;
            font-family: 'Almarai', sans-serif;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            transition: all 0.2s;
        }

        .thoughts-area:focus {
            border-color: #f5da9e;
            box-shadow: 0 0 0 2px rgba(245, 218, 158, 0.2);
        }

        .thoughts-area::placeholder {
            color: #7fa88a;
        }

        /* قسم المصروفات */
        .spending-form {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .spending-input {
            flex: 2;
            background: rgba(10, 35, 35, 0.6);
            border: 1px solid rgba(232, 201, 122, 0.4);
            border-radius: 60px;
            padding: 12px 18px;
            color: #e8f0e8;
            font-family: 'Almarai', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .spending-input:focus {
            border-color: #f5da9e;
        }

        .spending-amount {
            flex: 1;
            background: rgba(10, 35, 35, 0.6);
            border: 1px solid rgba(232, 201, 122, 0.4);
            border-radius: 60px;
            padding: 12px 18px;
            color: #e8f0e8;
            font-family: 'Almarai', monospace;
            font-size: 0.9rem;
            outline: none;
        }

        .add-btn {
            background: linear-gradient(125deg, #e8c97a, #d4ae5a);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-family: 'Changa', sans-serif;
            color: #1a3a3a;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-btn:active {
            transform: scale(0.97);
        }

        /* قائمة المصروفات */
        .spending-list {
            max-height: 280px;
            overflow-y: auto;
            margin-top: 16px;
        }

        .spending-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 35, 35, 0.5);
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 60px;
            transition: all 0.2s;
            animation: slideIn 0.3s ease;
        }

        .spending-item:hover {
            background: rgba(232, 201, 122, 0.15);
        }

        .spending-info {
            display: flex;
            gap: 12px;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .spending-name {
            font-weight: 600;
            color: #e8f0e8;
        }

        .spending-price {
            color: #f5da9e;
            font-weight: 700;
            font-family: monospace;
            font-size: 1rem;
        }

        .delete-btn {
            background: rgba(200, 80, 70, 0.3);
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: #ffaa99;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        /* إحصائيات المصروفات */
        .stats {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(232, 201, 122, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .total {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f5da9e;
        }

        .total span {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ffd966;
        }

        .reset-spending {
            background: rgba(232, 201, 122, 0.2);
            border: 1px solid #e8c97a;
            padding: 6px 16px;
            border-radius: 40px;
            color: #e8c97a;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .reset-spending:active {
            transform: scale(0.95);
        }

        /* قسم الملاحظات السريعة */
        .quick-notes {
            margin-top: 16px;
        }

        .note-input {
            width: 100%;
            background: rgba(10, 35, 35, 0.6);
            border: 1px solid rgba(232, 201, 122, 0.4);
            border-radius: 60px;
            padding: 12px 18px;
            color: #e8f0e8;
            font-family: 'Almarai', sans-serif;
            margin-bottom: 12px;
            outline: none;
        }

        .note-input:focus {
            border-color: #f5da9e;
        }

        .notes-list {
            max-height: 180px;
            overflow-y: auto;
        }

        .note-item {
            background: rgba(10, 35, 35, 0.5);
            padding: 10px 16px;
            margin-bottom: 6px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }

        .note-text {
            color: #e0f0e0;
            font-size: 0.85rem;
            word-break: break-word;
            flex: 1;
        }

        .delete-note {
            background: none;
            border: none;
            color: #ffaa99;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 0.8rem;
        }

        /* تأثيرات الحركة */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* تحسينات للجوال */
        @media (max-width: 850px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .card {
                padding: 18px;
            }
            .title {
                font-size: 1.6rem;
            }
            .spending-form {
                flex-direction: column;
            }
            .add-btn {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .card-header h2 {
                font-size: 1.1rem;
            }
            .total {
                font-size: 1rem;
            }
        }

        /* شريط التمرير المخصص */
        .spending-list::-webkit-scrollbar,
        .notes-list::-webkit-scrollbar {
            width: 4px;
        }
        .spending-list::-webkit-scrollbar-track,
        .notes-list::-webkit-scrollbar-track {
            background: #2e5a5a;
            border-radius: 10px;
        }
        .spending-list::-webkit-scrollbar-thumb,
        .notes-list::-webkit-scrollbar-thumb {
            background: #e8c97a;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <div class="title">📊 لوحة التحكم الذهبية 📊</div>
        <div class="subtitle">من المصمم <span style="color:#f5da9e;">سعود</span> | سجل أفكارك ومصروفاتك بأناقة</div>
    </div>

    <div class="grid">
        <!-- بطاقة الأفكار الطويلة -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-lightbulb"></i>
                <h2>📝 أفكاري وملاحظاتي</h2>
            </div>
            <textarea id="thoughtsArea" class="thoughts-area" placeholder="اكتب أفكارك، ملاحظاتك، أهدافك، أو أي شيء تريد تسجيله هنا..."></textarea>
            <div style="margin-top: 12px; display: flex; justify-content: flex-end;">
                <span style="font-size: 0.7rem; color: #8aae9a;">💾 يتم الحفظ تلقائيًا</span>
            </div>
        </div>

        <!-- بطاقة المصروفات -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-coins"></i>
                <h2>💰 سجل المصروفات</h2>
            </div>
            <div class="spending-form">
                <input type="text" id="expenseName" class="spending-input" placeholder="اسم المصروف (مثل: قهوة، مواصلات...)" autocomplete="off">
                <input type="number" id="expenseAmount" class="spending-amount" placeholder="المبلغ (ريال)" autocomplete="off">
                <button id="addExpenseBtn" class="add-btn"><i class="fas fa-plus"></i> إضافة</button>
            </div>
            <div id="expensesList" class="spending-list">
                <!-- سيتم عرض المصروفات هنا -->
                <div style="text-align: center; color: #8aae9a; padding: 20px;">لا توجد مصروفات مسجلة</div>
            </div>
            <div class="stats">
                <div class="total">💰 الإجمالي: <span id="totalAmount">0</span> ريال</div>
                <button id="resetExpensesBtn" class="reset-spending"><i class="fas fa-trash-alt"></i> حذف الكل</button>
            </div>
        </div>
    </div>

    <!-- بطاقة الملاحظات السريعة -->
    <div class="card" style="margin-top: 0;">
        <div class="card-header">
            <i class="fas fa-sticky-note"></i>
            <h2>📌 ملاحظات سريعة</h2>
        </div>
        <div class="quick-notes">
            <input type="text" id="quickNoteInput" class="note-input" placeholder="أضف ملاحظة سريعة..." autocomplete="off">
            <button id="addNoteBtn" class="add-btn" style="width: auto; padding: 10px 24px; margin-bottom: 16px;"><i class="fas fa-plus"></i> إضافة ملاحظة</button>
            <div id="notesList" class="notes-list">
                <div style="text-align: center; color: #8aae9a; padding: 20px;">لا توجد ملاحظات</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== إدارة التخزين المحلي ====================
    // تحميل البيانات المحفوظة
    let thoughts = localStorage.getItem("userThoughts") || "";
    let expenses = JSON.parse(localStorage.getItem("userExpenses")) || [];
    let quickNotes = JSON.parse(localStorage.getItem("quickNotes")) || [];

    // عناصر DOM
    const thoughtsArea = document.getElementById("thoughtsArea");
    const expenseNameInput = document.getElementById("expenseName");
    const expenseAmountInput = document.getElementById("expenseAmount");
    const addExpenseBtn = document.getElementById("addExpenseBtn");
    const expensesListDiv = document.getElementById("expensesList");
    const totalAmountSpan = document.getElementById("totalAmount");
    const resetExpensesBtn = document.getElementById("resetExpensesBtn");
    const quickNoteInput = document.getElementById("quickNoteInput");
    const addNoteBtn = document.getElementById("addNoteBtn");
    const notesListDiv = document.getElementById("notesList");

    // ==================== دالة تحديث الأفكار ====================
    function updateThoughts() {
        thoughtsArea.value = thoughts;
    }

    function saveThoughts() {
        thoughts = thoughtsArea.value;
        localStorage.setItem("userThoughts", thoughts);
    }

    // ==================== دالة تحديث المصروفات ====================
    function renderExpenses() {
        if (expenses.length === 0) {
            expensesListDiv.innerHTML = '<div style="text-align: center; color: #8aae9a; padding: 20px;">✨ لا توجد مصروفات مسجلة ✨</div>';
            totalAmountSpan.textContent = "0";
            return;
        }

        let total = 0;
        let html = "";
        expenses.forEach((expense, index) => {
            total += expense.amount;
            html += `
                <div class="spending-item" data-index="${index}">
                    <div class="spending-info">
                        <span class="spending-name">${escapeHtml(expense.name)}</span>
                        <span class="spending-price">${formatNumber(expense.amount)} ريال</span>
                    </div>
                    <button class="delete-btn" onclick="deleteExpense(${index})">
                        <i class="fas fa-trash-alt"></i> حذف
                    </button>
                </div>
            `;
        });
        expensesListDiv.innerHTML = html;
        totalAmountSpan.textContent = formatNumber(total);
    }

    function formatNumber(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function saveExpenses() {
        localStorage.setItem("userExpenses", JSON.stringify(expenses));
        renderExpenses();
    }

    function addExpense() {
        const name = expenseNameInput.value.trim();
        const amount = parseFloat(expenseAmountInput.value);

        if (!name) {
            alert("⚠️ الرجاء إدخال اسم المصروف");
            return;
        }
        if (isNaN(amount) || amount <= 0) {
            alert("⚠️ الرجاء إدخال مبلغ صحيح أكبر من 0");
            return;
        }

        expenses.push({
            name: name,
            amount: amount,
            date: new Date().toISOString()
        });
        saveExpenses();

        // تفريغ الحقول
        expenseNameInput.value = "";
        expenseAmountInput.value = "";
        
        // تأثير بسيط
        expenseNameInput.focus();
    }

    window.deleteExpense = function(index) {
        expenses.splice(index, 1);
        saveExpenses();
    };

    function resetAllExpenses() {
        if (expenses.length > 0 && confirm("🗑️ هل أنت متأكد من حذف جميع المصروفات؟")) {
            expenses = [];
            saveExpenses();
        }
    }

    // ==================== دالة الملاحظات السريعة ====================
    function renderNotes() {
        if (quickNotes.length === 0) {
            notesListDiv.innerHTML = '<div style="text-align: center; color: #8aae9a; padding: 20px;">📝 أضف ملاحظاتك السريعة هنا</div>';
            return;
        }

        let html = "";
        quickNotes.forEach((note, index) => {
            html += `
                <div class="note-item" data-note-index="${index}">
                    <span class="note-text">📌 ${escapeHtml(note)}</span>
                    <button class="delete-note" onclick="deleteNote(${index})">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
            `;
        });
        notesListDiv.innerHTML = html;
    }

    function saveNotes() {
        localStorage.setItem("quickNotes", JSON.stringify(quickNotes));
        renderNotes();
    }

    function addQuickNote() {
        const noteText = quickNoteInput.value.trim();
        if (!noteText) {
            alert("⚠️ الرجاء إدخال نص الملاحظة");
            return;
        }
        quickNotes.unshift(noteText); // إضافة في البداية
        saveNotes();
        quickNoteInput.value = "";
        quickNoteInput.focus();
    }

    window.deleteNote = function(index) {
        quickNotes.splice(index, 1);
        saveNotes();
    };

    // ==================== تهيئة الصفحة وتحميل البيانات ====================
    function init() {
        // تحميل الأفكار
        updateThoughts();
        
        // تحميل المصروفات
        renderExpenses();
        
        // تحميل الملاحظات
        renderNotes();
        
        // إضافة مستمعات الأحداث
        thoughtsArea.addEventListener("input", saveThoughts);
        addExpenseBtn.addEventListener("click", addExpense);
        resetExpensesBtn.addEventListener("click", resetAllExpenses);
        addNoteBtn.addEventListener("click", addQuickNote);
        
        // إضافة خاصية Enter في حقول الإدخال
        expenseNameInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") addExpense();
        });
        expenseAmountInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") addExpense();
        });
        quickNoteInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") addQuickNote();
        });
        
        // تأثيرات حركية إضافية
        addAnimationOnAdd();
    }
    
    // تأثيرات بسيطة عند الإضافة
    function addAnimationOnAdd() {
        const style = document.createElement('style');
        style.textContent = `
            .spending-item, .note-item {
                animation: slideIn 0.3s ease;
            }
        `;
        document.head.appendChild(style);
    }
    
    // بدء التشغيل
    init();
</script>
</body>
</html>
